<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clothing | ElectroLite</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 text-slate-900">
  <div class="min-h-screen">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-5">
        <a href="index.html" class="text-2xl font-semibold tracking-tight">ElectroLite</a>
        <nav class="flex items-center gap-6 text-sm font-medium text-slate-600">
          <a href="index.html">Electronics</a>
          <a href="clothes.html" class="text-slate-900">Clothing</a>
          <a href="cart.html" class="rounded-full bg-slate-900 px-4 py-2 text-white" data-track="nav-cart">Cart</a>
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-6xl px-6 py-12">
      <section class="mb-10 flex flex-col gap-4 md:flex-row md:items-end md:justify-between">
        <div>
          <p class="mb-2 text-sm font-semibold uppercase tracking-[0.2em] text-slate-500">Featured Clothing</p>
          <h1 class="text-4xl font-semibold tracking-tight">Clean clothing picks for daily wear.</h1>
        </div>
        <p class="max-w-xl text-sm leading-6 text-slate-600">
          A second category page for your demo store with simple clothing items and the same clean card layout.
        </p>
      </section>

      <section id="clothing-grid" class="grid gap-6 sm:grid-cols-2 lg:grid-cols-3"></section>
    </main>
  </div>

  <script>
    const clothingProducts = [
      { id: 101, name: 'Essential T-Shirt', price: 24.99, image: 'https://picsum.photos/300/200?random=11' },
      { id: 102, name: 'Classic Hoodie', price: 59.99, image: 'https://picsum.photos/300/200?random=12' },
      { id: 103, name: 'Slim Fit Jeans', price: 74.99, image: 'https://picsum.photos/300/200?random=13' },
      { id: 104, name: 'Overshirt Jacket', price: 89.99, image: 'https://picsum.photos/300/200?random=14' },
      { id: 105, name: 'Casual Sneakers', price: 94.99, image: 'https://picsum.photos/300/200?random=15' },
      { id: 106, name: 'Cotton Sweatpants', price: 49.99, image: 'https://picsum.photos/300/200?random=16' }
    ];

    const clothingGrid = document.getElementById('clothing-grid');

    function renderClothingProducts() {
      clothingGrid.innerHTML = clothingProducts.map(product => `
        <article class="overflow-hidden rounded-3xl border border-slate-200 bg-white shadow-sm transition hover:-translate-y-1 hover:shadow-lg">
          <img src="${product.image}" alt="${product.name}" class="h-52 w-full object-cover">
          <div class="space-y-4 p-6">
            <div class="space-y-2">
              <h2 class="text-xl font-semibold">${product.name}</h2>
              <p class="text-sm leading-6 text-slate-600">
                Comfortable everyday clothing with a minimal modern style.
              </p>
            </div>
            <div class="flex items-center justify-between">
              <span class="text-lg font-semibold">$${product.price.toFixed(2)}</span>
              <button
                type="button"
                data-track="clothing-add-${product.id}"
                class="rounded-full bg-slate-900 px-4 py-2 text-sm font-medium text-white transition hover:bg-slate-700"
                onclick="addToCart(${product.id})"
              >
                Add to Cart
              </button>
            </div>
          </div>
        </article>
      `).join('');
    }

    function getCart() {
      return JSON.parse(localStorage.getItem('cart') || '[]');
    }

    function setCart(cart) {
      localStorage.setItem('cart', JSON.stringify(cart));
    }

    function addToCart(productId) {
      const product = clothingProducts.find(item => item.id === productId);
      if (!product) return;

      const cart = getCart();
      const existing = cart.find(item => item.id === product.id);

      if (existing) {
        existing.quantity += 1;
      } else {
        cart.push({
          id: product.id,
          name: product.name,
          price: product.price,
          image: product.image,
          quantity: 1
        });
      }

      setCart(cart);
      alert(product.name + ' added to cart.');
    }

    renderClothingProducts();
  </script>

  <script src="tracker.js"></script>
  <script>initSession().then(trackPageview)</script>
</body>
</html>
